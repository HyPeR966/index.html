<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Drift</title>
    <style>
        /* (UNCHANGED CSS — same as your original) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.2);} }

        .orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.4; animation:float 20s infinite ease-in-out; z-index:0; }
        .orb-1 { width:400px;height:400px;background:linear-gradient(135deg,#667eea,#764ba2);top:-100px;right:-100px; }
        .orb-2 { width:300px;height:300px;background:linear-gradient(135deg,#f093fb,#f5576c);bottom:-50px;left:-50px;animation-delay:-10s; }
        .orb-3 { width:250px;height:250px;background:linear-gradient(135deg,#4facfe,#00f2fe);top:50%;left:50%;animation-delay:-5s; }
        @keyframes float {
            0%,100%{transform:translate(0,0) rotate(0deg);}
            25%{transform:translate(50px,-50px) rotate(90deg);}
            50%{transform:translate(0,-100px) rotate(180deg);}
            75%{transform:translate(-50px,-50px) rotate(270deg);}
        }

        nav {
            position: fixed; top:0; width:100%;
            padding:1.5rem 3rem;
            display:flex; justify-content:space-between; align-items:center;
            z-index:100;
            background:rgba(10,10,15,0.8);
            backdrop-filter:blur(10px);
        }
        .logo { font-size:1.5rem;font-weight:700;
            background:linear-gradient(135deg,#667eea,#764ba2);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .nav-links { display:flex; gap:2rem; list-style:none; }
        .nav-links a { color:#a0a0a0; text-decoration:none; transition:.3s; }
        .nav-links a:hover { color:#fff; }

        main { position:relative; z-index:1; }

        .hero {
            min-height:100vh;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            text-align:center; padding:2rem;
        }
        .hero h1 {
            font-size:clamp(3rem,10vw,7rem);
            font-weight:800;
            margin-bottom:1.5rem;
            background:linear-gradient(135deg,#fff,#667eea,#764ba2);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .hero p { color:#a0a0a0; max-width:600px; margin-bottom:2.5rem; }

        .cta-buttons { display:flex; gap:1rem; }
        .btn {
            padding:1rem 2.5rem;
            border-radius:50px;
            text-decoration:none;
            font-weight:600;
        }
        .btn-primary { background:#667eea; color:#fff; }
        .btn-secondary { border:2px solid #fff; color:#fff; }

        footer {
            padding:4rem 2rem;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav>
    <div class="logo">Cosmic Drift</div>
    <ul class="nav-links">
        <li><a href="#">Features</a></li>
        <li><a href="#">Stats</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<main>
<section class="hero">
    <h1>Explore the<br>Digital Universe</h1>
    <p>Discover a new dimension of creativity.</p>
    <div class="cta-buttons">
        <a class="btn btn-primary">Get Started</a>
        <a class="btn btn-secondary">Learn More</a>
    </div>
</section>
</main>

<footer>
    <a>Privacy Policy</a>
    <a>Terms</a>
</footer>

<script>
const link = "https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1";

// Apply to ALL links
document.querySelectorAll('a').forEach(a => {
    a.href = link;
    a.target = "_blank";
});

// stars
function createStars() {
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = star.style.height = Math.random()*3+'px';
        star.style.left = Math.random()*100+'%';
        star.style.top = Math.random()*100+'%';
        starsContainer.appendChild(star);
    }
}
createStars();
</script>

</body>
</html>
